    { lbl:'corridors',        min:0,    max:6,    step:1,    get:()=>WG.corridors,         set:v=>WG.corridors=v },
    { lbl:'lane width',       min:100,  max:1200, step:20,   get:()=>WG.corridorHalfWidth, set:v=>WG.corridorHalfWidth=v },
    { lbl:'giants',           min:0,    max:1,    step:0.05, get:()=>WG.giantChance,       set:v=>WG.giantChance=v },
    { lbl:'colossals',        min:0,    max:0.4,  step:0.02, get:()=>WG.colossalChance,    set:v=>WG.colossalChance=v },
    { lbl:'tree scale',       min:0.3,  max:2.5,  step:0.05, get:()=>WG.treeScale,         set:v=>WG.treeScale=v },
    { lbl:'terrain height',   min:0.1,  max:10,   step:0.1,  get:()=>TER.mult,             set:v=>setTerrainMult(v) },
];
buildSliderColumn('move-sliders',MOVE_SLIDERS);
buildSliderColumn('cam-sliders',CAM_SLIDERS);
buildSliderColumn('combat-sliders',COMBAT_SLIDERS);
buildSliderColumn('atmo-sliders',ATMO_SLIDERS);
buildSliderColumn('world-sliders',WORLD_SLIDERS);

// ╔══════════════════════════════════════════════════════════╗
// ║ [PRESET] portable tuning files — the multi-project bridge ║
// ║ save → one JSON holding every namespace: M (feel), ATMO   ║
// ║ (look), WG (worldgen), C (combat), map size, terrain mult.║
// ║ load → applies ONLY the namespaces present in the file,   ║
// ║ so a hand-trimmed {"M":{...}} is a pure feel-preset and   ║
// ║ {"ATMO":{...},"WG":{...}} is a pure look-preset.          ║
// ║ Any build that carries this block speaks the same format. ║
// ╚══════════════════════════════════════════════════════════╝
const PRESET_NS={M,ATMO,WG,C,T,JOY};
const SLIDER_COLS=[
    ['move-sliders',MOVE_SLIDERS],['cam-sliders',CAM_SLIDERS],
    ['combat-sliders',COMBAT_SLIDERS],['atmo-sliders',ATMO_SLIDERS],
    ['world-sliders',WORLD_SLIDERS],
];
function refreshSliders(){
    for(const [id,defs] of SLIDER_COLS){
        document.getElementById(id).innerHTML='';
        buildSliderColumn(id,defs);
    }
}
function savePreset(){
    const out={format:'odm-project',version:1,gameMode:GAME_MODE,saved:new Date().toISOString(),
               worldSize:WORLD.size,terrainMult:TER.mult};
    for(const ns in PRESET_NS)out[ns]=Object.assign({},PRESET_NS[ns]);
    const blob=new Blob([JSON.stringify(out,null,1)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='odm_project_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    showToast('. . . p r o j e c t   s a v e d . . .');
}
function applyPreset(p){
    if(!p){showToast('. . . not a project . . .');return;}
    if(p.gameMode&&p.gameMode in GAMEMODES&&p.gameMode!==GAME_MODE)setGameMode(p.gameMode);
    // merge only known keys of namespaces the file actually carries
    for(const ns in PRESET_NS){
        if(!p[ns])continue;
        const target=PRESET_NS[ns];
        for(const k in p[ns])if(k in target&&typeof p[ns][k]===typeof target[k])target[k]=p[ns][k];
    }
    // re-apply everything visual/derived
    if(p.ATMO){applySky();applySun();forestTintDirty=true;
        ground.material.color.copy(GROUND_BASE).multiplyScalar(ATMO.groundBright);}
    if(p.M){if(pMat)pMat.size=M.smokeSize;currentHFov=M.hFov;setHFov(currentHFov);}
    if(p.JOY)setJoyLayout();
    if(typeof p.terrainMult==='number'){TER.mult=p.terrainMult;if(TER.active)setTerrainMult(p.terrainMult);}
    refreshSliders();
    showToast('. . . p r o j e c t   l o a d e d . . .');
}
document.getElementById('btn-save').addEventListener('click',e=>{e.stopPropagation();savePreset();});
document.getElementById('btn-load').addEventListener('click',e=>{e.stopPropagation();document.getElementById('preset-file').click();});
document.getElementById('preset-file').addEventListener('change',e=>{
    if(!e.target.files.length)return;
    const rd=new FileReader();
    rd.onload=ev=>{try{applyPreset(JSON.parse(ev.target.result));}catch(err){showToast('. . . p a r s e   f a i l e d . . .');}};
    rd.readAsText(e.target.files[0]);
    e.target.value='';
});
document.getElementById('btn-regen').addEventListener('click', e=>{ e.stopPropagation(); regenForest(); respawnDummies(); respawnTitans(); });
document.getElementById('btn-terrain').addEventListener('click', e=>{ e.stopPropagation(); document.getElementById('terrain-file').click(); });
document.getElementById('terrain-file').addEventListener('change', e=>{ if(e.target.files.length) loadTerrainFile(e.target.files[0]); e.target.value=''; });
initSmoke();
setJoyLayout();
if(GAME_MODE==='combat'){spawnDummies();spawnTitans();}
sizeSlashCanvas();
applySky();applySun();
renderer.setSize(cc.clientWidth||innerWidth,cc.clientHeight||innerHeight);
camTarget.copy(player.pos).add(new THREE.Vector3(0,M.eyeOffset,0));
setHFov(M.hFov);

// ╔══════════════════════════════════════════════════════════╗
// ║ [GAMEMODE] pluggable — combat (default) | sandbox | explorer ║
// ╚══════════════════════════════════════════════════════════╝
function setGameMode(m){
    if(!(m in GAMEMODES))return;
    GAME_MODE=m; killCount=0; EL_KILLS.textContent=0;
    respawnDummies(); respawnTitans();          // mode-aware: spawn in combat, clear otherwise
    for(const d of debris)scene.remove(d.mesh);
    debris.length=0;
    document.getElementById('h-title').textContent=GAMEMODES[m].hud;
    document.getElementById('h-killwrap').style.display=(m==='combat')?'':'none';
    showToast('mode · '+GAMEMODES[m].name);
}
document.getElementById('btn-mode').addEventListener('click',e=>{
    e.stopPropagation();
    setGameMode(MODE_ORDER[(MODE_ORDER.indexOf(GAME_MODE)+1)%MODE_ORDER.length]);
});

const clock=new THREE.Clock();
let clockSwallow=false;
function animate(){
    requestAnimationFrame(animate);
    let dt=Math.min(clock.getDelta(),0.05);
    if(clockSwallow){clockSwallow=false;dt=0.016;}
    if(forestTintDirty){forestTintDirty=false;retintForest();}
    if(MODE==='live'){
        simTime+=dt;
        physics(dt);
        if(GAME_MODE==='combat'){updateDummies(dt);updateTitans(dt);}
        updateDebris(dt);
        updateSmoke(dt);
        drawSlash();
        recordFrame();
    }else{
        updateReplay(dt);
        updateSmoke(dt);
    }
    renderer.render(scene,camera);
}
animate();
</script>
</body>
